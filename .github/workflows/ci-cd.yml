name: Cloud Cost Leak CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Backend Test
        run: |
          python -c "from src.app import app; print('Backend test passed successfully')"

      - name: Build Backend Docker Image
        run: |
          docker build -f Dockerfile.backend -t cloud-backend .

      - name: Build Frontend Docker Image
        run: |
          docker build -f Dockerfile.frontend -t cloud-frontend .

      - name: Deploy Step
        run: |
          echo "Deployment successful"